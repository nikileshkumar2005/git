<!DOCTYPE html>
<html>
<head>

<title>Paper To Cloud</title>

<link rel="stylesheet" href="a.css">

</head>

<body>


<div class="animation">


    <!-- single paper -->

    <div class="document">
        📄
    </div>



    <!-- rocket -->

    <div class="rocket">

        🚀


        <!-- paper bundle attached -->

        <div class="bundle">

            <div class="sheet one"></div>
            <div class="sheet two"></div>
            <div class="sheet three"></div>

            <div class="rope"></div>
            <img src="av.png" alt="alter">

        </div>


    </div>



    <!-- cloud -->


    <div class="cloud">

        ☁

    </div>
   <div class="monitor">

    <div class="screen">
        <img src="a3.png" class="logo">
    </div>

    <div class="stand"></div>

</div>


</div>


</body>
</html>
